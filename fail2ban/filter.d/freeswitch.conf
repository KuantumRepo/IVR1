# FreeSWITCH SIP auth failure filter for fail2ban
# Catches registration and INVITE auth failures from scanner bots
#
# Requires: log-auth-failures=true in the sofia profile
#
# Docker json-file log driver wraps each line in JSON:
#   {"log":"...actual FS log line...\n","stream":"stderr","time":"..."}
# The failregex patterns account for this JSON wrapper prefix.

[Definition]
# Match auth failures (wrong password for real or non-existent users)
# Also match "Can't find user" (scanner guessing random extensions)
failregex = SIP auth failure \((?:REGISTER|INVITE)\) on sofia profile '[^']+' for \[[^\]]*\] from ip <HOST>
            Can't find user \[[^\]]*\] from <HOST>

ignoreregex =
