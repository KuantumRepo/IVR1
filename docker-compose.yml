
services:
  caddy:
    image: caddy:2
    profiles: ["full-stack"]
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN_NAME=${DOMAIN_NAME:-localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend

  freeswitch:
    build: ./freeswitch
    # ── Host networking (industry standard for VoIP in Docker) ──────────────
    # Eliminates Docker bridge NAT overhead and iptables-per-port rules.
    # Required for 500+ concurrent calls — bridge networking creates a
    # userland proxy per mapped port which freezes the host at scale.
    # FS binds directly to host interfaces for SIP (5060/5080) and RTP (16384-32768).
    network_mode: host
    environment:
      - EXT_RTP_IP=${EXT_RTP_IP:-stun:stun.freeswitch.org}
      - EXT_SIP_IP=${EXT_SIP_IP:-stun:stun.freeswitch.org}
      # Enable native FreeSWITCH sound packs (hold music, IVR prompts, ring tones)
      - SOUND_RATES=8000:16000
      - SOUND_TYPES=music:en-us-callie
      - FS_ESL_PASSWORD=${FS_ESL_PASSWORD:-ClueCon}
    # No 'ports:' block — host networking exposes all ports directly.
    # FS listens on: 8021 (ESL), 5060 (internal SIP), 5080 (external SIP),
    # 16384-32768 (RTP media)
    cap_add:
      - SYS_NICE
      - NET_ADMIN
      - NET_RAW
    ulimits:
      rtprio: 99
      memlock: -1
      # 500 concurrent calls × 2 RTP fds + ESL + control = ~1200 fds minimum
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - ./freeswitch/conf:/usr/local/freeswitch/etc/freeswitch
      - ./freeswitch/scripts:/usr/local/freeswitch/share/freeswitch/scripts
      - ./data/audio:/audio
    healthcheck:
      # Verify core status AND both AMD modules are loaded
      test: ["CMD-SHELL", "fs_cli -p $$FS_ESL_PASSWORD -x 'module_exists mod_amd' | grep -q true && fs_cli -p $$FS_ESL_PASSWORD -x 'module_exists mod_avmd' | grep -q true && fs_cli -p $$FS_ESL_PASSWORD -x 'status'"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 45s
    restart: unless-stopped

  whisper-amd:
    build: ./whisper-amd
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # Model config — loads once at startup, shared across all WS connections
      - WHISPER_MODEL_SIZE=small
      # CPU-only inference via CTranslate2 INT8 quantization (~400MB RAM)
      - DEVICE=cpu
      - COMPUTE_TYPE=int8
      # Seconds of audio to buffer before emitting an early AMD decision
      - EARLY_SEC=2.0
    ports:
      - "8080:8080"
    volumes:
      # Cache the downloaded Whisper model across container rebuilds
      - whisper_models:/root/.cache/huggingface
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      # Model loading takes 15-30s on first startup
      start_period: 60s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          # Whisper 'small' model needs ~900MB. 1.5G gives headroom for
          # concurrent inference when multiple calls hit Layer 2 simultaneously.
          memory: 1.5G

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: broadcaster
      POSTGRES_USER: broadcaster
      POSTGRES_PASSWORD: ${DB_PASSWORD:-broadcaster_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U broadcaster -d broadcaster"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build: ./backend
    profiles: ["full-stack"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://broadcaster:${DB_PASSWORD:-broadcaster_secret}@postgres/broadcaster
      REDIS_URL: redis://redis:6379
      # FS runs on host network — connect via host.docker.internal
      # (the backend is on bridge network, FS is on host network)
      FS_ESL_HOST: host.docker.internal
      FS_ESL_PORT: 8021
      FS_ESL_PASSWORD: ${FS_ESL_PASSWORD:-ClueCon}
      # Public-facing SIP domain for agent softphone registration
      # Set FS_SIP_DOMAIN to your server's public IP or domain
      FS_SIP_DOMAIN: ${FS_SIP_DOMAIN:-127.0.0.1}
      FS_SIP_PORT: ${FS_SIP_PORT:-5060}
      # Whisper AMD sidecar — Docker DNS resolves in compose network
      WHISPER_AMD_WS_URL: ws://whisper-amd:8080/ws/amd
      # Audio shared volume path (inside Docker)
      AUDIO_DIR: /audio
      # FreeSWITCH conf shared volume path (inside Docker)
      FS_CONF_DIR: /usr/local/freeswitch/etc/freeswitch
    volumes:
      - ./data/audio:/audio
      - ./data/csv:/csv
      - ./freeswitch/conf:/usr/local/freeswitch/etc/freeswitch:rw
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      # NOTE: freeswitch runs on host network, so Docker healthcheck
      # cross-network dependency doesn't work. The ESL connection manager
      # in connection.py has auto-reconnect logic to handle startup ordering.
    restart: unless-stopped

  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    profiles: ["full-stack"]
    environment:
      INTERNAL_API_URL: http://backend:8000/api/v1
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  whisper_models:
  caddy_data:
  caddy_config:
