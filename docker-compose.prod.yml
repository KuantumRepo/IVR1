services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN_NAME=${DOMAIN_NAME}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: broadcaster
      POSTGRES_USER: broadcaster
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  backend:
    # Notice: NO build context here, pulls pre-built image
    image: ghcr.io/your-username/broadcaster-backend:latest
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: postgresql+asyncpg://broadcaster:${DB_PASSWORD}@postgres/broadcaster
      REDIS_URL: redis://redis:6379
      FS_ESL_HOST: host.docker.internal
      FS_ESL_PORT: 8021
      FS_ESL_PASSWORD: ${FS_ESL_PASSWORD}
      FS_SIP_DOMAIN: ${FS_SIP_DOMAIN}
      FS_SIP_PORT: ${FS_SIP_PORT:-5060}
      WHISPER_AMD_WS_URL: ws://whisper-amd:8080/ws/amd
      AUDIO_DIR: /audio
      FS_CONF_DIR: /usr/local/freeswitch/etc/freeswitch
    volumes:
      - shared_audio:/audio
      - shared_csv:/csv
      - ./freeswitch/conf:/usr/local/freeswitch/etc/freeswitch:rw
    depends_on:
      - postgres
      - redis

  frontend:
    # Notice: NO build context here, pulls pre-built image
    image: ghcr.io/your-username/broadcaster-frontend:latest
    restart: unless-stopped
    environment:
      INTERNAL_API_URL: http://backend:8000/api/v1
    depends_on:
      - backend

  freeswitch:
    # Currently pointing to a dockerfile, but for true CI/CD this should also be an image.
    # We will assume you will build and push freeswitch image as well.
    image: ghcr.io/your-username/broadcaster-freeswitch:latest
    network_mode: host
    restart: unless-stopped
    environment:
      - EXT_RTP_IP=${EXT_RTP_IP:-stun:stun.freeswitch.org}
      - EXT_SIP_IP=${EXT_SIP_IP:-stun:stun.freeswitch.org}
      - SOUND_RATES=8000:16000
      - SOUND_TYPES=music:en-us-callie
    cap_add:
      - SYS_NICE
      - NET_ADMIN
      - NET_RAW
    ulimits:
      rtprio: 99
      memlock: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - ./freeswitch/conf:/usr/local/freeswitch/etc/freeswitch
      - ./freeswitch/scripts:/usr/local/freeswitch/share/freeswitch/scripts
      - shared_audio:/audio

  whisper-amd:
    # Notice: NO build context here, pulls pre-built image
    image: ghcr.io/your-username/broadcaster-whisper-amd:latest
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - WHISPER_MODEL_SIZE=small
      - DEVICE=cpu
      - COMPUTE_TYPE=int8
      - EARLY_SEC=2.0
    volumes:
      - whisper_models:/root/.cache/huggingface

volumes:
  postgres_data:
  shared_audio:
  shared_csv:
  whisper_models:
  caddy_data:
  caddy_config:
